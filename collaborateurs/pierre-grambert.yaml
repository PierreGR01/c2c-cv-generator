    competences: [Figma]
    realisations:
      - Étude de l'environnement existant et analyse ergonomique complète.
      - Ateliers de co-conception avec les équipes open source internationales.
      - Production de wireframes, maquettes et prototypes interactifs haute fidélité.
    domaines: [design, geospatial]
    secteur: public
    poids: 5

