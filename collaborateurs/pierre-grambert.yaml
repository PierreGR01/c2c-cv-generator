identite:
  prenom: Pierre
  nom: Grambert
  poste: UX Designer
  categorie_poste: designer
  departement: Geospatial Solutions
  annee_debut_carriere: 2014   # calcul automatique de experience_ans à la génération
  localisation: France
  disponibilite: Disponible
  langues:
    - { langue: Français, niveau: Bilingue }
    - { langue: Anglais, niveau: Bilingue }

# Profil par défaut (neutre, sans doublon avec les certifications)
profil: >
  Designer UX/UI senior avec plus de 10 ans d'expérience dans la conception
  de produits numériques. Intervient sur l'ensemble du cycle de conception :
  recherche utilisateurs, ateliers de co-conception, wireframes, maquettes et
  prototypes interactifs. Expérience transversale sur des applications web
  géospatiales, services publics numériques, chatbots IA et plateformes
  contributives.

profils_cibles:
  geospatial: >
    Designer UX/UI spécialisé dans les applications géospatiales et les portails
    de données publiques. Plus de 10 ans de pratique de la recherche utilisateurs
    à la production de maquettes, avec une expertise sur geOrchestra, GeoNetwork
    et les services de l'État.
  service-public: >
    Designer UX/UI senior spécialisé dans les services publics numériques.
    Maîtrise du Design System de l'État français et du Design System Oblique
    (Confédération suisse). Pratique des ateliers de co-conception, tests
    utilisateurs et ergonomie pour des portails à fort enjeu citoyen.
  ia-chatbot: >
    Designer UX/UI expérimenté dans la conception d'interfaces conversationnelles
    et IA. Intervention rapide, benchmarking, conception itérative et prototypage
    haute fidélité pour des projets à cycle court.

competences:
  - categorie: Design & prototypage
    domaines: [design]
    items: [Figma, Adobe Creative Suite, Wireframes, Maquettes, Prototypes interactifs, Illustrations, Benchmarking]
  - categorie: Design systems
    domaines: [design]
    items: [Design System de l'État (DSFR), Design System Oblique (Confédération suisse)]
  - categorie: Méthodes UX
    domaines: [design]
    items: [Recherche utilisateurs, Tests utilisateurs, Ateliers co-conception, Ergonomie]
  - categorie: Domaines
    domaines: [developpement]
    items: [Applications géospatiales, Services publics numériques, Chatbots IA, Plateformes contributives]
  - categorie: Gestion de projet
    domaines: [business]
    items: [Agile/Scrum, PSM I, Cadrage fonctionnel, Mentorat]

certifications:
  - { intitule: Professional Scrum Master PSM I, organisme: Scrum.org }
  - { intitule: Master Design Interactif, organisme: Pôle supérieur des arts appliqués de Villefontaine, annee: 2014 }
  - { intitule: BTS Communication visuelle multimédia, organisme: Pôle supérieur des arts appliqués de Villefontaine, annee: 2012 }

